name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: appifylab-social-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: /home/ubuntu/appifylab-social
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail

          test -n "$SERVER_HOST" || { echo "SERVER_HOST secret is required."; exit 1; }
          test -n "$SERVER_USER" || { echo "SERVER_USER secret is required."; exit 1; }
          test -n "${{ secrets.SERVER_SSH_KEY }}" || { echo "SERVER_SSH_KEY secret is required."; exit 1; }
          test -n "${{ secrets.BACKEND_ENV_FILE }}" || { echo "BACKEND_ENV_FILE secret is required."; exit 1; }
          test -n "${{ secrets.FRONTEND_ENV_FILE }}" || { echo "FRONTEND_ENV_FILE secret is required."; exit 1; }

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Ensure application directory exists
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p '$APP_DIR'"

      - name: Sync repository to server
        shell: bash
        run: |
          set -Eeuo pipefail

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='backend/public/posts' \
            -czf - . | ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "$SERVER_USER@$SERVER_HOST" \
            "tar -xzf - -C '$APP_DIR'"

      - name: Upload environment files
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p '$APP_DIR/backend' '$APP_DIR/frontend'"

          printf '%s\n' "${{ secrets.BACKEND_ENV_FILE }}" | ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "$SERVER_USER@$SERVER_HOST" \
            "umask 077 && cat > '$APP_DIR/backend/.env'"

          printf '%s\n' "${{ secrets.FRONTEND_ENV_FILE }}" | ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "$SERVER_USER@$SERVER_HOST" \
            "umask 077 && cat > '$APP_DIR/frontend/.env'"

      - name: Run deployment script
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=accept-new \
            "$SERVER_USER@$SERVER_HOST" \
            "cd '$APP_DIR' && chmod +x scripts/deploy.sh && ./scripts/deploy.sh"
